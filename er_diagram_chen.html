<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>ER Diagram – Human Safety AI (Chen Notation)</title>
    <style>
        body {
            margin: 0;
            background: #0d1b2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px 60px;
        }

        h1 {
            color: #00d4ff;
            font-family: monospace;
            font-size: 1.3rem;
            margin-bottom: 4px;
            text-align: center;
        }

        p {
            color: #7a9ab5;
            font-size: 0.78rem;
            margin-bottom: 20px;
            font-family: sans-serif;
            text-align: center;
        }

        .legend {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 18px;
        }

        .li {
            display: flex;
            align-items: center;
            gap: 7px;
            color: #cde6f7;
            font-family: sans-serif;
            font-size: 0.75rem;
        }

        .lb {
            width: 28px;
            height: 16px;
            border: 2px solid #00d4ff;
            background: #112240;
            border-radius: 3px;
        }

        .lc {
            width: 40px;
            height: 20px;
            background: #0a3d6b;
            border: 2px solid #ffd700;
            border-radius: 50%;
        }

        .ld {
            width: 30px;
            height: 18px;
            background: #1a0a3d;
            border: 2px solid #b44fff;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        .lu {
            width: 36px;
            height: 18px;
            background: #0a2d0a;
            border: 2px solid #00ff88;
            border-radius: 50%;
        }

        svg {
            display: block;
            max-width: 100%;
        }
    </style>
</head>
